name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Avoid wasted work if a developer pushes new commits while a previous
# pipeline for the same branch is still running.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run pytest (quality gate)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  deploy-green:
    name: Deploy to staging (green) and smoke-test
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook (green / staging)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_GREEN }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_GREEN secret is not set."
            exit 1
          fi
          curl -fsSL -X POST "$HOOK"

      - name: Smoke test green service
        env:
          GREEN_URL: ${{ vars.GREEN_URL }}
        run: |
          if [ -z "$GREEN_URL" ]; then
            echo "::error::GREEN_URL repository variable is not set."
            exit 1
          fi
          ./scripts/smoke.sh "$GREEN_URL" green "${GITHUB_SHA}"

  deploy-blue:
    name: Promote to production (blue)
    needs: deploy-green
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook (blue / production)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BLUE }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_BLUE secret is not set."
            exit 1
          fi
          curl -fsSL -X POST "$HOOK"

      - name: Verify blue service after promotion
        env:
          BLUE_URL: ${{ vars.BLUE_URL }}
        run: |
          if [ -z "$BLUE_URL" ]; then
            echo "::error::BLUE_URL repository variable is not set."
            exit 1
          fi
          ./scripts/smoke.sh "$BLUE_URL" blue "${GITHUB_SHA}"
